<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chatbot</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <span>🤖 AI Support Chatbot</span>
    <small>Always Online</small>
  </div>
  <div class="chat-box" id="chatBox">
    <div class="message bot"><span>Hello! I'm your AI assistant. How can I help you today? 😊</span></div>
  </div>
  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off"/>
    <button onclick="sendMessage()">Send</button>
  </div>
</div>
<script>
  const chatBox = document.getElementById('chatBox');
  const userInput = document.getElementById('userInput');
  userInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') sendMessage(); });
  function appendMessage(text, sender) {
    const div = document.createElement('div');
    div.classList.add('message', sender);
    div.innerHTML = '<span>' + text + '</span>';
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }
  function appendTyping() {
    const div = document.createElement('div');
    div.classList.add('message', 'bot', 'typing');
    div.id = 'typingIndicator';
    div.innerHTML = '<span>...</span>';
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }
  function removeTyping() { const el = document.getElementById('typingIndicator'); if (el) el.remove(); }
  async function sendMessage() {
    const message = userInput.value.trim();
    if (!message) return;
    appendMessage(message, 'user');
    userInput.value = '';
    appendTyping();
    try {
      const res = await fetch('/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message }) });
      const data = await res.json();
      removeTyping();
      appendMessage(data.response, 'bot');
    } catch (err) { removeTyping(); appendMessage('Something went wrong.', 'bot'); }
  }
</script>
</body>
</html>
